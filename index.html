    <script>
      const io = new IntersectionObserver(
        (entries) => {
          for (const e of entries) {
            if (e.isIntersecting) {
              e.target.classList.add('show');
              io.unobserve(e.target);
            }
          }
        },
        { threshold: 0.2 }
      );
      document.querySelectorAll('.fade-in').forEach((el) => io.observe(el));

      // Top bar split animation: use "width" to derive target displacement, avoiding reliance on current position measurement, stable even with scaling/layout changes
      const root = document.documentElement;
      const topGroup = document.getElementById('top-group');
      const avatarWrap = document.getElementById('avatar-wrap');
      const avatar = document.getElementById('avatar');
      const nav = document.querySelector('nav');

      const state = { avatarShift: 0, navShift: 0, t: 0, scrollDistance: 320 };

      function edgeGap() {
        const val = getComputedStyle(root).getPropertyValue('--edge-gap');
        const n = parseFloat(val);
        return Number.isFinite(n) ? n : 24;
      }

      function computeShifts() {
        const vw = window.innerWidth;
        const gapEdge = edgeGap();
        const g = getComputedStyle(topGroup);
        const groupGap = parseFloat(g.columnGap || g.gap) || 0;

        const avatarW = avatar.getBoundingClientRect().width;
        const navW = nav.getBoundingClientRect().width;

        const groupWidth = avatarW + groupGap + navW;
        const centerLeft = vw / 2 - groupWidth / 2;

        // Target: avatar left to left edge gapEdge; nav right to right edge gapEdge
        const desiredAvatarLeft = gapEdge;
        const desiredNavLeft = vw - gapEdge - navW;

        state.avatarShift = desiredAvatarLeft - centerLeft;
        state.navShift = desiredNavLeft - (centerLeft + avatarW + groupGap);

        applyTransforms();
      }

      function applyTransforms() {
        const t = state.t; // 0~1
        // Translation only applies to the outer container, internal image scaling controlled by CSS
        if (avatarWrap)
          avatarWrap.style.transform = `translateX(${state.avatarShift * t}px)`;
        nav.style.transform = `translateX(${state.navShift * t}px)`;
        // Parent container remains horizontally centered (set in CSS)
      }

      let ticking = false;
      let retractRAF = null; // Retract animation rAF handle
      let programmaticScroll = false; // Flag: programmatic scroll to top

      function onScroll() {
        // During programmatic smooth scroll to top, do not override state.t with scrollY to avoid "scroll up then revert" feeling
        if (programmaticScroll) {
          if (window.scrollY === 0) programmaticScroll = false; // Restore normal after reaching top
          if (!ticking) {
            requestAnimationFrame(() => {
              applyTransforms();
              ticking = false;
            });
            ticking = true;
          }
          return;
        }
        if (!ticking) {
          requestAnimationFrame(() => {
            state.t = Math.min(Math.max(window.scrollY / state.scrollDistance, 0), 1);
            applyTransforms();
            ticking = false;
          });
          ticking = true;
        }
      }

      // Smooth scroll (directly handled in goTopAndRetract / nav links)

      // Scroll to top and retract simultaneously (t → 0), both in parallel
      function goTopAndRetract() {
        const wasAtTop = window.scrollY === 0;
        if (!wasAtTop) {
          programmaticScroll = true;
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Start retract animation
        if (retractRAF) cancelAnimationFrame(retractRAF);
        const from = state.t;
        const to = 0;
        const duration = 420;
        const start = performance.now();
        const easeOutCubic = (x) => 1 - Math.pow(1 - x, 3);
        const step = (now) => {
          const p = Math.min(1, (now - start) / duration);
          state.t = from + (to - from) * easeOutCubic(p);
          applyTransforms();
          if (p < 1) {
            retractRAF = requestAnimationFrame(step);
          } else {
            retractRAF = null;
            // If we were already at top when clicked, ensure the flag is not left on
            if (wasAtTop) programmaticScroll = false;
          }
        };
        retractRAF = requestAnimationFrame(step);
      }
      window.goTopAndRetract = goTopAndRetract;

      document.querySelectorAll('nav a[href^="#"]').forEach((a) => {
        a.addEventListener('click', (e) => {
          e.preventDefault();
          const target = document.querySelector(a.getAttribute('href'));
          if (target) target.scrollIntoView({ behavior: 'smooth' });
        });
      });

      // Listen for size changes: window changes, font/content changes (ResizeObserver), more stable
      const ro = new ResizeObserver(() => computeShifts());
      ro.observe(nav);
      if (avatarWrap) ro.observe(avatarWrap);

      window.addEventListener('scroll', onScroll, { passive: true });
      window.addEventListener('resize', computeShifts);
      window.addEventListener('orientationchange', computeShifts);

      // Initial
      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(computeShifts);
      }
      window.addEventListener('load', computeShifts);
      computeShifts();

      // Always start at top on refresh/back-forward navigation
      if ('scrollRestoration' in history) {
        history.scrollRestoration = 'manual';
      }
      const resetToTop = () => {
        window.scrollTo({ top: 0, left: 0, behavior: 'auto' });
        state.t = 0;
        applyTransforms();
      };
      window.addEventListener('pageshow', resetToTop);
      window.addEventListener('load', resetToTop);

      // ================== Jank-free Marquee for Work Rails ==================
      (function initMarquees() {
        const rails = Array.from(document.querySelectorAll('.work-rail'));
        if (!rails.length) return;

        const reduce =
          window.matchMedia &&
          window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        const tracks = rails
          .map((rail) => {
            const el = rail.querySelector('.rail-track');
            if (!el) return null;
            // Duplicate one full set for seamless loop (do once)
            if (!el.dataset.marqueeDoubled) {
              const clones = Array.from(el.children).map((n) => n.cloneNode(true));
              clones.forEach((n) => el.appendChild(n));
              el.dataset.marqueeDoubled = '1';
            }
            return {
              rail,
              el,
              x: 0,
              half: 0,
              duration: 20,
              paused: false,
              enabled: !reduce
            };
          })
          .filter(Boolean);

        function measure() {
          tracks.forEach((t) => {
            // After duplication, half equals one set width
            t.half = t.el.scrollWidth / 2;
          });
        }
        measure();

        // Re-measure on resize/orientation and when images load
        const onResize = () => measure();
        window.addEventListener('resize', onResize);
        window.addEventListener('orientationchange', onResize);
        document.querySelectorAll('.rail-track img').forEach((img) => {
          if (!img.complete) img.addEventListener('load', measure, { once: true });
        });

        // Pause on hover and window blur
        tracks.forEach((t) => {
          t.rail.addEventListener('mouseenter', () => {
            t.paused = true;
          });
          t.rail.addEventListener('mouseleave', () => {
            t.paused = false;
          });
        });
        window.addEventListener('blur', () => tracks.forEach((t) => (t.paused = true)));
        window.addEventListener('focus', () => tracks.forEach((t) => (t.paused = false)));

        if (!tracks.some((t) => t.enabled)) return; // reduced-motion: all disabled

        let last = performance.now();
        function tick(now) {
          const dt = Math.min(0.05, (now - last) / 1000); // cap delta to avoid jumps
          last = now;
          for (const t of tracks) {
            if (!t.enabled || t.paused || !t.half) continue;
            const pxPerSec = t.half / t.duration; // one set per duration seconds
            t.x -= pxPerSec * dt;
            if (t.x <= -t.half) t.x += t.half;
            t.el.style.transform = `translate3d(${t.x}px,0,0)`;
          }
          requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
      })();
    </script>
